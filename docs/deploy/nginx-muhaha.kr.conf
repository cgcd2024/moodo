# 무도짤 저장소 nginx 설정
# 사용법 (원격 서버에서):
#   sudo cp docs/deploy/nginx-muhaha.kr.conf /etc/nginx/sites-available/muhaha.kr
#   sudo ln -sf /etc/nginx/sites-available/muhaha.kr /etc/nginx/sites-enabled/muhaha.kr
#   sudo rm -f /etc/nginx/sites-enabled/default   # 기존 설정과 충돌 시
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL 적용 (설정이 80에서 동작 확인된 후):
#   sudo certbot --nginx -d muhaha.kr
#   (443 서버 블록과 인증서, 자동 갱신까지 certbot이 알아서 추가)

server {
    listen 80;
    server_name muhaha.kr;

    # 프론트엔드 빌드 산출물 (npm run build 결과)
    root /home/ubuntu/moodo/dist;
    index index.html;

    # SPA 라우팅: 없는 경로는 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 API 프록시
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 업로드 이미지 프록시
    location /uploads {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    # 이미지 업로드 허용 용량 (기본 1MB면 업로드가 413으로 실패한다)
    client_max_body_size 12m;
}
